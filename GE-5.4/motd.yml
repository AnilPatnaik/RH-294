---
- name: Configure the message of the day
  hosts: all
  remote_user: devops
  become: true
  vars:
    system_owner: "web-support@example.com"
  tasks:
    - name: Configure /etc/motd
      ansible.builtin.template:
        src: templates/motd.j2
        dest: /etc/motd
        owner: root
        group: root
        mode: '0644'
